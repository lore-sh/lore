name: Web Pages Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'packages/web/**'
      - 'scripts/web/**'
      - 'install.sh'
      - 'bun.lock'
      - 'package.json'
      - '.github/workflows/web-pages.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'packages/web/**'
      - 'scripts/web/**'
      - 'install.sh'
      - 'bun.lock'
      - 'package.json'
      - '.github/workflows/web-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: web-pages-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun ci

      - name: Build web
        run: bun run --cwd packages/web build

      - name: Validate Cloudflare configuration
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_PAGES_PROJECT_WEB: ${{ vars.CLOUDFLARE_PAGES_PROJECT_WEB }}
        run: |
          set -euo pipefail
          [[ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ]] || { echo "Missing secret: CLOUDFLARE_ACCOUNT_ID"; exit 1; }
          [[ -n "${CLOUDFLARE_API_TOKEN:-}" ]] || { echo "Missing secret: CLOUDFLARE_API_TOKEN"; exit 1; }
          [[ -n "${CLOUDFLARE_PAGES_PROJECT_WEB:-}" ]] || { echo "Missing variable: CLOUDFLARE_PAGES_PROJECT_WEB"; exit 1; }

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          packageManager: bun
          wranglerVersion: "4.69.0"
          command: >-
            pages deploy packages/web/dist
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_WEB }}
            --branch=${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Deployment summary
        run: |
          {
            echo "### Cloudflare Pages deployment"
            echo ""
            echo "- Project: \`${{ vars.CLOUDFLARE_PAGES_PROJECT_WEB }}\`"
            echo "- Branch: \`${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}\`"
            echo "- URL: ${{ steps.deploy.outputs.pages-deployment-alias-url || steps.deploy.outputs.deployment-url || 'N/A' }}"
          } >> "$GITHUB_STEP_SUMMARY"
